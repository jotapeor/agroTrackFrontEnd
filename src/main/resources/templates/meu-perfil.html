<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <title>AgroTrack — Meu Perfil</title>
    <meta charset="UTF-8">
    <meta name="description" content="AgroTrack — Editar seu perfil.">
    <link rel="icon" type="image/png" th:href="@{/icon.png}">
    <th:block th:replace="~{fragments/layout :: head-content}"></th:block>
</head>
<body>
<div class="at-sidebar-overlay" id="sidebarOverlay"></div>
<div class="at-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="at-main">
        <div th:replace="~{fragments/layout :: topbar('Meu Perfil')}"></div>
        <main class="at-content" id="main-content">
            <div class="at-page-header">
                <h1 class="at-page-title">Meu Perfil</h1>
                <p class="at-page-subtitle">Edite seus dados pessoais.</p>
            </div>

            <div th:if="${mensagemSucesso}" class="at-alert at-alert-success" role="alert">
                <i class="bi bi-check-circle"></i> <span th:text="${mensagemSucesso}">Sucesso.</span>
            </div>
            <div th:if="${errorMessage}" class="at-alert at-alert-danger" role="alert">
                <i class="bi bi-exclamation-circle"></i> <span th:text="${errorMessage}">Erro.</span>
            </div>

            <div style="max-width: 640px;">
                <div class="at-card">
                    <div class="at-card-header">
                        <h2 class="at-card-title">Dados da Conta</h2>
                        <span class="at-badge"
                              th:classappend="${session.role == 'PROPRIETARIO' ? 'at-badge-warning' : (session.role == 'SOCIO' ? 'at-badge-primary' : 'at-badge-info')}"
                              th:text="${session.role == 'PROPRIETARIO' ? 'Proprietário' : (session.role == 'SOCIO' ? 'Sócio' : 'Operador')}">Perfil</span>
                    </div>
                    <div class="at-card-body">
                        <div th:if="${usuario != null}" style="text-align:center; margin-bottom:20px;">
                            <div class="person-avatar" style="width:100px;height:100px;border-radius:50%;margin:0 auto 12px;overflow:hidden;background:#f0fdf4;display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--at-text-muted);">
                                <img th:if="${usuario.foto_path}" th:src="'http://localhost:8080/uploads/usuarios/' + ${usuario.foto_path}" alt="Minha foto" style="width:100%;height:100%;object-fit:cover;" />
                                <i th:unless="${usuario.foto_path}" class="bi bi-person-circle"></i>
                            </div>
                        </div>

                        <form th:action="@{/meu-perfil}" method="post" enctype="multipart/form-data" novalidate>

                            <div class="at-form-group">
                                <label class="at-form-label" for="nome">Nome <span class="required">*</span></label>
                                <input type="text" id="nome" name="nome" class="at-form-control"
                                       th:value="${usuario.nome}" minlength="3" required />
                            </div>

                            <div class="at-form-group">
                                <label class="at-form-label" for="email">E-mail <span class="required">*</span></label>
                                <input type="email" id="email" name="email" class="at-form-control"
                                       th:value="${usuario.email}" required />
                            </div>

                            <div class="at-form-group">
                                <label class="at-form-label" for="foto">Foto</label>
                                <input type="file" id="foto" name="foto" class="at-form-control"
                                       accept="image/png, image/jpeg, image/webp" />
                                <span class="at-form-hint" th:if="${usuario.foto_path}">Foto atual: <span th:text="${usuario.foto_path}"></span>. Envie uma nova para substituir.</span>
                                <span class="at-form-hint" th:unless="${usuario.foto_path}">Formatos aceitos: PNG, JPG, WebP. Máx: 5MB.</span>
                                <div id="foto-preview" style="margin-top:8px; display:none;">
                                    <img id="preview-img" src="#" alt="Preview"
                                         style="max-width:200px; max-height:150px; border:1px solid var(--at-border); padding:4px;" />
                                </div>
                            </div>

                            <div class="at-alert at-alert-info" style="margin-bottom:16px;">
                                <i class="bi bi-info-circle"></i>
                                <span>Para alterar sua senha, use a opção de "Alterar Senha" no primeiro acesso ou pelo dashboard.</span>
                            </div>

                            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg"></i> Salvar Alterações
                                </button>
                                <a th:href="@{/dashboard}" class="btn btn-ghost">
                                    Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const fotoInput = document.getElementById('foto');
        const previewDiv = document.getElementById('foto-preview');
        const previewImg = document.getElementById('preview-img');
        if (fotoInput) {
            fotoInput.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        previewImg.src = e.target.result;
                        previewDiv.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                } else {
                    previewDiv.style.display = 'none';
                    previewImg.src = '#';
                }
            });
        }
    });
</script>
</body>
</html>
