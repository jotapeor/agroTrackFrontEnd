<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <title>AgroTrack — Ordens de Manutenção</title>
    <meta charset="UTF-8">
    <th:block th:replace="~{fragments/layout :: head-content}"></th:block>
    <style>
        .order-card { background: var(--at-surface); border: 1px solid var(--at-border); border-radius: var(--at-radius); padding: 16px; margin-bottom: 16px; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .order-title { font-weight: 600; font-size: 1.1rem; color: var(--at-text); }
        .order-subtitle { font-size: 0.85rem; color: var(--at-text-secondary); }
        .order-body { font-size: 0.95rem; color: var(--at-text-muted); margin-bottom: 16px; }
        .order-actions { display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px solid var(--at-border); padding-top: 12px; }
    </style>
</head>
<body>
<div class="at-sidebar-overlay" id="sidebarOverlay"></div>
<div class="at-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="at-main">
        <div th:replace="~{fragments/layout :: topbar('Ordens de Manutenção')}"></div>
        <main class="at-content">
            <div class="at-page-header" style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h1 class="at-page-title">Ordens de Manutenção</h1>
                    <p class="at-page-subtitle" th:text="${#lists.size(ordens) + ' ordem(ns) registrada(s).'}">0 ordens.</p>
                </div>
                <a th:href="@{/ordens/nova}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> Nova Ordem
                </a>
            </div>

            <div th:if="${mensagemSucesso}" class="at-alert at-alert-success" role="alert">
                <i class="bi bi-check-circle"></i> <span th:text="${mensagemSucesso}"></span>
            </div>
            <div th:if="${errorMessage}" class="at-alert at-alert-danger" role="alert">
                <i class="bi bi-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
            </div>

            <div th:if="${#lists.isEmpty(ordens)}" style="text-align: center; padding: 40px; color: var(--at-text-muted);">
                Nenhuma ordem de manutenção encontrada.
            </div>

            <div th:each="o : ${ordens}" class="order-card">
                <div class="order-header">
                    <div>
                        <div class="order-title" th:text="'Máquina: ' + ${o.nomeMaquina}">Máquina</div>
                        <div class="order-subtitle">
                            Solicitante: <span th:text="${o.nomeSolicitante}"></span> |
                            Abertura: <span th:text="${o.dataAbertura.replace('T', ' ').substring(0, 16)}"></span>
                            <span th:if="${o.dataEncerramento}"> | Encerramento: <span th:text="${o.dataEncerramento.replace('T', ' ').substring(0, 16)}"></span></span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <span class="at-badge" th:classappend="${o.status == 'Ativa' ? 'at-badge-success' : (o.status == 'Aguardando Aprovação' ? 'at-badge-warning' : (o.status == 'Recusada' ? 'at-badge-danger' : 'at-badge-neutral'))}" th:text="${o.status}">Status</span>
                        <span class="at-badge" style="margin-top: 4px; display: inline-block;" th:classappend="${o.prioridade == 'Baixa' ? 'at-badge-success' : (o.prioridade == 'Media' ? 'at-badge-warning' : (o.prioridade == 'Critica' ? 'at-badge-danger' : 'at-badge-danger'))}" th:text="'Prioridade: ' + ${o.prioridade}">Prioridade</span>
                    </div>
                </div>
                <div class="order-body">
                    <strong>Descrição do Problema:</strong>
                    <div th:text="${o.descricao}" style="margin-top: 4px; padding: 8px; background: #f8fafc; border-radius: 4px; border: 1px solid #e2e8f0;"></div>
                    
                    <div th:if="${o.observacaoEncerramento}" style="margin-top: 12px;">
                        <strong>Observação de Encerramento:</strong>
                        <div th:text="${o.observacaoEncerramento}" style="margin-top: 4px; padding: 8px; background: #f0fdf4; border-radius: 4px; border: 1px solid #bbf7d0; color: #166534;"></div>
                    </div>
                </div>

                <div class="order-actions" th:if="${session.role == 'PROPRIETARIO' && o.status != 'Encerrada' && o.status != 'Recusada'}">
                    <th:block th:if="${o.status == 'Aguardando Aprovação'}">
                        <form th:action="@{/ordens/{id}/aprovar(id=${o.id})}" method="post" style="display:inline;">
                            <input type="hidden" name="aprovada" value="true">
                            <button type="submit" class="btn btn-outline" style="color: var(--at-success); border-color: var(--at-success);">
                                <i class="bi bi-check-lg"></i> Aprovar
                            </button>
                        </form>
                        <form th:action="@{/ordens/{id}/aprovar(id=${o.id})}" method="post" style="display:inline;">
                            <input type="hidden" name="aprovada" value="false">
                            <button type="submit" class="btn btn-outline" style="color: var(--at-danger); border-color: var(--at-danger);">
                                <i class="bi bi-x-lg"></i> Recusar
                            </button>
                        </form>
                    </th:block>

                    <button th:if="${o.status == 'Ativa'}" type="button" class="btn btn-primary btn-sm" th:data-id="${o.id}" onclick="abrirModalEncerramento(this.getAttribute('data-id'))">
                        <i class="bi bi-check2-all"></i> Encerrar Ordem
                    </button>
                </div>
            </div>
        </main>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </div>
</div>

<div id="encerrarModal" class="confirm-modal-overlay" style="display:none;">
    <div class="confirm-modal">
        <div class="confirm-modal-title">Encerrar Ordem de Manutenção</div>
        <form id="encerrarForm" method="post">
            <div class="at-form-group" style="margin-top: 16px;">
                <label class="at-form-label">Observações / Serviço Realizado <span class="required">*</span></label>
                <textarea name="observacao" class="at-form-control" rows="3" required></textarea>
            </div>
            <div class="confirm-modal-actions">
                <button type="button" class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar e Encerrar</button>
            </div>
        </form>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
    function abrirModalEncerramento(id) {
        document.getElementById('encerrarForm').action = '/ordens/' + id + '/encerrar';
        document.getElementById('encerrarModal').style.display = 'flex';
    }
    function fecharModal() {
        document.getElementById('encerrarModal').style.display = 'none';
    }
</script>
</body>
</html>
