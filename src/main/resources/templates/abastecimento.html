<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <title>AgroTrack — Registrar Abastecimento</title>
    <meta charset="UTF-8">
    <meta name="description" content="AgroTrack — Registrar abastecimento da frota.">
    <link rel="icon" type="image/png" th:href="@{/icon.png}">
    <th:block th:replace="~{fragments/layout :: head-content}"></th:block>
</head>
<body>
<div class="at-sidebar-overlay" id="sidebarOverlay"></div>
<div class="at-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="at-main">
        <div th:replace="~{fragments/layout :: topbar('Abastecimentos')}"></div>
        <main class="at-content" id="main-content">
            <div class="at-page-header">
                <h1 class="at-page-title">Registrar Abastecimento</h1>
                <p class="at-page-subtitle">Lance o abastecimento de combustível para manter o controle de consumo e gastos da frota.</p>
            </div>

            <div th:if="${errorMessage}" class="at-alert at-alert-danger" role="alert">
                <i class="bi bi-exclamation-circle"></i> <span th:text="${errorMessage}">Erro.</span>
            </div>
            <div th:if="${mensagemSucesso}" class="at-alert at-alert-success" role="alert">
                <i class="bi bi-check-circle"></i> <span th:text="${mensagemSucesso}">Sucesso.</span>
            </div>

            <div class="at-card" style="max-width: 800px; margin: 0 auto;">
                <div class="at-card-header">
                    <h2 class="at-card-title">Dados do Abastecimento</h2>
                </div>
                <div class="at-card-body">
                    <form th:action="@{/abastecimentos}" method="post">
                        <div class="at-form-group">
                            <label class="at-form-label" for="idMaquina">Máquina <span class="required">*</span></label>
                            <select id="idMaquina" name="idMaquina" class="at-form-control at-form-select" required>
                                <option value="">Selecione a máquina...</option>
                                <option th:each="m : ${maquinas}" th:value="${m.id}" th:text="${m.nome} + ' (' + ${m.marca} + ' ' + ${m.modelo} + ')'"></option>
                            </select>
                        </div>
                        
                        <div class="at-grid at-grid-2">
                            <div class="at-form-group">
                                <label class="at-form-label" for="dataAbastecimento">Data e Hora</label>
                                <input type="datetime-local" id="dataAbastecimento" name="dataAbastecimento" class="at-form-control">
                                <span class="at-form-hint">Deixe em branco para usar a data/hora atual.</span>
                            </div>
                            <div class="at-form-group">
                                <label class="at-form-label" for="tipoCombustivel">Combustível <span class="required">*</span></label>
                                <select id="tipoCombustivel" name="tipoCombustivel" class="at-form-control at-form-select" required>
                                    <option value="">Selecione</option>
                                    <option value="Diesel S10">Diesel S10</option>
                                    <option value="Diesel S500">Diesel S500</option>
                                    <option value="Gasolina">Gasolina</option>
                                    <option value="Etanol">Etanol</option>
                                </select>
                            </div>
                        </div>

                        <div class="at-grid at-grid-2">
                            <div class="at-form-group">
                                <label class="at-form-label" for="litros">Litros <span class="required">*</span></label>
                                <input type="number" step="0.01" min="0.1" id="litros" name="litros" class="at-form-control" placeholder="Ex: 150.5" required>
                            </div>
                            <div class="at-form-group">
                                <label class="at-form-label" for="hodometroAtual">Hodômetro / Horímetro Atual <span class="required">*</span></label>
                                <input type="number" step="0.1" min="0" id="hodometroAtual" name="hodometroAtual" class="at-form-control" placeholder="Ex: 1250.5" required>
                            </div>
                        </div>

                        <div style="margin-top: 24px;">
                            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Registrar Abastecimento</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
