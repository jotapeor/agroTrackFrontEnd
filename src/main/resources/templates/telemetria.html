<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <title>AgroTrack — Telemetria</title>
    <meta charset="UTF-8">
    <meta name="description" content="Telemetria da máquina em tempo real.">
    <link rel="icon" type="image/png" th:href="@{/icon.png}">
    <th:block th:replace="~{fragments/layout :: head-content}"></th:block>
    <style>
        .telemetry-container { background:var(--at-surface); border:1px solid var(--at-border); border-radius:12px; padding:24px; }
        .telemetry-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-top:24px; }
        .telemetry-card { background:var(--at-surface); border:1px solid var(--at-border); border-radius:16px; padding:24px; text-align:center; box-shadow: 0 10px 30px rgba(148, 163, 184, 0.08); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease; }
        .telemetry-card:hover { transform:translateY(-6px); box-shadow: 0 20px 40px rgba(148, 163, 184, 0.12); }
        .telemetry-value { font-size:2rem; font-weight:700; color:var(--at-primary); margin:8px 0; }
        .telemetry-label { font-size:0.9rem; color:var(--at-text-secondary); text-transform:uppercase; letter-spacing:0.5px; }
        .pulse-indicator { display:inline-block; width:10px; height:10px; border-radius:50%; background-color:#10b981; margin-right:8px; box-shadow: 0 0 0 rgba(16, 185, 129, 0.4); animation: pulse 2s infinite; }
        .stopped-indicator { display:inline-block; width:10px; height:10px; border-radius:50%; background-color:#ef4444; margin-right:8px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body>
<div class="at-sidebar-overlay" id="sidebarOverlay"></div>
<div class="at-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="at-main">
        <div th:replace="~{fragments/layout :: topbar('Telemetria')}"></div>
        <main class="at-content" id="main-content">
            <div class="at-page-header fade-in">
                <a th:href="@{/maquinas}" class="btn btn-ghost btn-sm" style="margin-bottom:12px;">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
                <h1 class="at-page-title">Telemetria: <span th:text="${maquina.nome}">Máquina</span></h1>
                <p class="at-page-subtitle">Acompanhamento em tempo real</p>
            </div>

            <div class="at-panel-glass fade-in delay-1">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
                    <div>
                        <span id="status-indicator" class="pulse-indicator"></span>
                        <strong id="status-text" style="font-size:1.1rem;">Buscando dados...</strong>
                    </div>
                    <div style="color:var(--at-text-secondary); font-size:0.9rem;">
                        Última atualização: <span id="last-update">--:--:--</span>
                    </div>
                </div>

                <div class="telemetry-grid">
                    <div class="telemetry-card fade-in delay-2">
                        <i class="bi bi-person-fill" style="font-size:1.5rem; color:var(--at-text-muted);"></i>
                        <div class="telemetry-value" id="val-operador" style="font-size:1.4rem;">--</div>
                        <div class="telemetry-label">Operador Atual</div>
                    </div>
                    <div class="telemetry-card fade-in delay-3">
                        <i class="bi bi-speedometer2" style="font-size:1.5rem; color:var(--at-text-muted);"></i>
                        <div class="telemetry-value"><span id="val-velocidade">--</span> <span style="font-size:1rem; color:var(--at-text-muted);">km/h</span></div>
                        <div class="telemetry-label">Velocidade</div>
                    </div>
                    <div class="telemetry-card fade-in delay-4">
                        <i class="bi bi-fuel-pump" style="font-size:1.5rem; color:var(--at-text-muted);"></i>
                        <div class="telemetry-value"><span id="val-consumo">--</span> <span style="font-size:1rem; color:var(--at-text-muted);">L/h</span></div>
                        <div class="telemetry-label">Consumo Atual</div>
                    </div>
                    <div class="telemetry-card fade-in delay-5" style="grid-column:1/-1; display:flex; justify-content:space-around;">
                        <div>
                            <i class="bi bi-geo-alt" style="font-size:1.2rem; color:var(--at-text-muted);"></i>
                            <div class="telemetry-label" style="margin-top:8px;">Latitude</div>
                            <div style="font-size:1.2rem; font-family:monospace; margin-top:4px;" id="val-lat">--</div>
                        </div>
                        <div>
                            <i class="bi bi-geo-alt" style="font-size:1.2rem; color:var(--at-text-muted);"></i>
                            <div class="telemetry-label" style="margin-top:8px;">Longitude</div>
                            <div style="font-size:1.2rem; font-family:monospace; margin-top:4px;" id="val-lon">--</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script th:inline="javascript">
    const idMaquina = [[${maquina.id}]];

    function atualizarTelemetria() {
        fetch('/api/maquinas/' + idMaquina + '/telemetria/dados')
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    console.error(data.error);
                    return;
                }

                const dataObj = new Date();
                document.getElementById('last-update').innerText = dataObj.toLocaleTimeString();

                if (data.emOperacao) {
                    document.getElementById('status-indicator').className = 'pulse-indicator';
                    document.getElementById('status-text').innerText = 'Em Operação - Transmitindo';
                    document.getElementById('status-text').style.color = '#10b981';
                } else {
                    document.getElementById('status-indicator').className = 'stopped-indicator';
                    document.getElementById('status-text').innerText = 'Máquina Parada';
                    document.getElementById('status-text').style.color = '#ef4444';
                }

                document.getElementById('val-operador').innerText = data.operadorAtual || 'Nenhum';
                document.getElementById('val-velocidade').innerText = data.velocidadeAtual !== null ? parseFloat(data.velocidadeAtual).toFixed(1) : '--';
                document.getElementById('val-consumo').innerText = data.consumoAtual !== null ? parseFloat(data.consumoAtual).toFixed(1) : '--';
                document.getElementById('val-lat').innerText = data.latitude !== null ? data.latitude : '--';
                document.getElementById('val-lon').innerText = data.longitude !== null ? data.longitude : '--';
            })
            .catch(err => console.error("Erro ao buscar telemetria", err));
    }

    atualizarTelemetria();
    setInterval(atualizarTelemetria, 8000);
</script>
</body>
</html>
