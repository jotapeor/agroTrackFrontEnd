<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <title>AgroTrack — Colaboradores</title>
    <meta charset="UTF-8">
    <meta name="description" content="AgroTrack — Listagem de colaboradores.">
    <link rel="icon" type="image/png" th:href="@{/icon.png}">
    <th:block th:replace="~{fragments/layout :: head-content}"></th:block>
    <style>
        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .person-card {
            background: var(--at-surface);
            border: 1px solid var(--at-border);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(148, 163, 184, 0.08);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px 16px 16px;
        }
        .person-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(148, 163, 184, 0.12);
        }
        .person-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: #f0fdf4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--at-text-muted);
            font-size: 2.5rem;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .person-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .person-name {
            font-size: .95rem;
            font-weight: 700;
            color: var(--at-text);
        }
        .person-email {
            font-size: .78rem;
            color: var(--at-text-muted);
            margin-bottom: 8px;
        }
        .person-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 12px;
        }
        .person-actions {
            margin-top: auto;
            width: 100%;
        }
        .person-actions .btn {
            width: 100%;
        }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--at-text-muted);
        }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="at-sidebar-overlay" id="sidebarOverlay"></div>
<div class="at-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="at-main">
        <div th:replace="~{fragments/layout :: topbar('Colaboradores')}"></div>
        <main class="at-content" id="main-content">
            <div class="at-page-header fade-in" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
                <div>
                    <h1 class="at-page-title">Colaboradores</h1>
                    <p class="at-page-subtitle" th:text="${#lists.size(colaboradores) + ' colaborador(es) cadastrado(s).'}">0 colaboradores.</p>
                </div>
                <a th:if="${session.role == 'PROPRIETARIO'}" th:href="@{/novo-colaborador}" class="btn btn-primary">
                    <i class="bi bi-person-plus"></i> Novo Colaborador
                </a>
            </div>

            <div th:if="${mensagemSucesso}" class="at-alert at-alert-success" role="alert">
                <i class="bi bi-check-circle"></i> <span th:text="${mensagemSucesso}">Sucesso.</span>
            </div>
            <div th:if="${errorMessage}" class="at-alert at-alert-danger" role="alert">
                <i class="bi bi-exclamation-circle"></i> <span th:text="${errorMessage}">Erro.</span>
            </div>

            <div class="people-grid">
                <div class="person-card fade-in" th:each="c, iterStat : ${colaboradores}" th:if="${!#lists.isEmpty(colaboradores)}" th:style="'animation-delay: ' + ${#numbers.formatDecimal(iterStat.index * 0.05, 1, 2, 'POINT')} + 's'">
                    <div class="person-avatar">
                        <img th:if="${c.foto_path}" th:src="'http://localhost:8080/uploads/usuarios/' + ${c.foto_path}" alt="Foto" />
                        <i th:unless="${c.foto_path}" class="bi bi-person"></i>
                    </div>
                    <div class="person-name" th:text="${c.nome}">Nome</div>
                    <div class="person-email" th:text="${c.email}">Email</div>

                    <div class="person-tags">
                        <span class="at-badge"
                              th:classappend="${c.perfil == 'PROPRIETARIO' ? 'at-badge-success' : (c.perfil == 'SOCIO' ? 'at-badge-info' : 'at-badge-warning')}"
                              th:text="${c.perfil == 'PROPRIETARIO' ? 'Proprietário' : (c.perfil == 'SOCIO' ? 'Sócio' : 'Operador')}">Perfil</span>
                        <span class="at-badge" th:classappend="${c.ativo ? 'at-badge-success' : 'at-badge-danger'}"
                              th:text="${c.ativo ? 'Ativo' : 'Inativo'}">Status</span>
                        <span th:if="${c.primeiro_acesso}" class="at-badge at-badge-warning">1º Acesso</span>
                    </div>

                    <div class="person-actions">

                        <a th:if="${session.role == 'PROPRIETARIO'}"
                           th:href="@{/colaboradores/editar/{id}(id=${c.id_usuario})}"
                           class="btn btn-outline btn-sm">
                            <i class="bi bi-pencil"></i> Editar / Vincular
                        </a>

                        <a th:if="${session.role == 'SOCIO' && c.perfil == 'OPERADOR'}"
                           th:href="@{/colaboradores/editar/{id}(id=${c.id_usuario})}"
                           class="btn btn-outline btn-sm">
                            <i class="bi bi-pencil"></i> Editar / Vincular
                        </a>

                        <span th:if="${session.role == 'OPERADOR' || (session.role == 'SOCIO' && c.perfil != 'OPERADOR')}"
                              style="font-size:.8rem; color:var(--at-text-muted);">—</span>
                    </div>
                </div>

                <div class="empty-state" th:if="${#lists.isEmpty(colaboradores)}">
                    <i class="bi bi-people"></i>
                    <div style="font-size:1rem; font-weight:600;">Nenhum colaborador cadastrado</div>
                    <p style="margin-top:4px;">Cadastre o primeiro colaborador para começar.</p>
                    <a th:href="@{/novo-colaborador}" class="btn btn-primary" style="margin-top:12px;">
                        <i class="bi bi-person-plus"></i> Cadastrar Colaborador
                    </a>
                </div>
            </div>
        </main>
        <div th:replace="~{fragments/layout :: footer}"></div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
